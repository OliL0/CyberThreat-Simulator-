<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Engineering Simulation </title>
    <link rel="stylesheet" href="simulation.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Social Engineering Simulation</h1>
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">Score:</span>
                    <span class="stat-value" id="score">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Completed:</span>
                    <span class="stat-value" id="completed">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Failed:</span>
                    <span class="stat-value" id="failed">0</span>
                </div>
            </div>
        </div>
        <div class="tabs">
            <button class="tab-button active" onclick="switchTab('emails')" id="emailTab">
                Emails Scenarios 
            </button>
            <button class="tab-button" onclick="switchTab('calls')" id="callTab">
                Call Scenarios 
            </button>
        </div>
        <div class="main-content">
            <div class="inbox">
                <div class="inbox-header">
                    <h2 id="inboxTitle">Inbox</h2>
                </div>
                <div class="inbox-list" id="inboxList"></div>
            </div>
            <div class="scenario">
                <div class="scenario-placeholder" id="placeholder">
                    <div class="placeholder-content">
                        <h3>Select a scenario to begin</h3>
                        <p>Choose an email or call transcript from the inbox to start. Press on any suspicious text in the scenario to identify suspicious elements</p>
                    </div>
                </div>
                <div class="scenario-content" id="scenarioContent"></div>
            </div>
        </div>
    </div>
    <div class="Mfeedback" id="feedbackM">
        <div class="">
            <div id=""></div>
        </div>
    </div>
    <script src="simulation.js"></script>
</body>
</html>
