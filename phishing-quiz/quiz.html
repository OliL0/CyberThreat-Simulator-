<!DOCTYPE html> 
<html lang="en">
<head>
    <link rel="stylesheet" href="quiz.css">
</head>
<body>
    <div class="main-title">
        <div class="title" id="main-title">Loading...</div>
        <div class="info" id="scene-info">Info Loading</div>
    </div>
    <div>
        <button class="phishing-button" onclick = "phishingAnswer()">Phishing</button>
        <button class="legit-button" onclick="legitAnswer()">Legitimate</button>
    </div>
    <div class="wrapper">
        <div id ="scenario-box">
            <div class="scenario-header" id="scenario-header">
                <div class="message-date" id="date">Date: ....</div>
            </div>
            <h1 id="scene-title">Loading Scenario...</h1>
            <div id="scenario-content">
                <p>Loading content....</p>
            </div>
            <div id="feedbackBox" style="display:none"></div>
        </div>
    
        <div class="answer-buttons">
            <button id="return-b">Return</button>
            <button id="next-b" onclick="nextScenario()">Next </button>
        </div>
    </div>
<script src="quiz.js"></script>
</body>

</html>
